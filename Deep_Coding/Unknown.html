<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>横スクロールシューティング with ステージエディタ</title>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: monospace;
        }
        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
        }
        canvas {
            border: 2px solid #0f0;
            background: #000;
            display: block;
        }
        #editorPanel {
            position: absolute;
            top: 0;
            right: 0;
            width: 320px;
            background: #111;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px;
            font-size: 12px;
            max-height: 600px;
            overflow-y: auto;
            display: none;
            z-index: 20;
        }
        #editorPanel h3, #editorPanel h4 {
            margin: 5px 0;
            color: #0f0;
        }
        #editorPanel button, #editorPanel input, #editorPanel select {
            background: #222;
            color: #0f0;
            border: 1px solid #0f0;
            margin: 2px;
            font-size: 11px;
        }
        #editorPanel ul {
            list-style: none;
            padding-left: 0;
        }
        #editorPanel li {
            border-bottom: 1px dotted #0f0;
            margin: 5px 0;
            padding: 2px;
        }
        .status {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 5px;
            z-index: 10;
        }
        .controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #0f0;
            font-size: 12px;
            background: rgba(0,0,0,0.7);
            padding: 5px;
        }
        button {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="status" id="status">SCORE: 0  LIVES: 3  BOMB: 3</div>
    <div class="controls">←↑↓→:移動 Z:射撃 X:ボム Q:ポーズ R:リスタート(ゲームオーバー時) E:エディタ(タイトル画面)</div>
    <div id="editorPanel">
        <h3>Stage Editor</h3>
        <button id="closeEditor">Close</button>
        <div>
            <h4>Stages</h4>
            <select id="stageSelect"></select>
            <button id="newStage">New Stage</button>
            <button id="deleteStage">Delete Stage</button>
            <button id="saveStage">Save Stage</button>
        </div>
        <div>
            <h4>Enemy List</h4>
            <ul id="enemyList"></ul>
            <h4>Add Enemy</h4>
            <form id="addEnemyForm">
                Shape: <select id="shape">
                    <option value="square">Square</option>
                    <option value="circle">Circle</option>
                    <option value="triangle">Triangle</option>
                </select><br>
                HP: <input type="number" id="hp" value="1" min="1"><br>
                Size: <input type="number" id="size" value="20" min="5"><br>
                Spawn Frame: <input type="number" id="spawnFrame" value="0" min="0"><br>
                Bullet Type: <select id="bulletType">
                    <option value="none">None</option>
                    <option value="straight">Straight</option>
                </select><br>
                <button type="button" id="addEnemyBtn">Add Enemy</button>
            </form>
            <hr>
            <button id="saveToLocal">Save to LocalStorage</button>
            <button id="loadFromLocal">Load from LocalStorage</button>
            <button id="exportJSON">Export JSON</button>
            <input type="file" id="importJSON" accept=".json" style="display:none">
            <button id="importBtn">Import JSON</button>
            <button id="applyToGame">Apply to Game</button>
        </div>
    </div>
</div>

<script>
    // -------- キャンバスとコンテキスト --------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // -------- ゲーム状態 --------
    let gameState = 'title'; // title, playing, pause, gameOver, clear, editor
    let frameCount = 0;
    let score = 0;
    let bombCount = 3;
    let enemiesDefeated = 0; // ステージクリア用

    // -------- 自機 --------
    const player = {
        x: canvas.width/2,
        y: canvas.height/2,
        width: 20,
        height: 20,
        speed: 5,
        lives: 3,
        invincibleFrames: 0
    };

    // -------- 動的オブジェクト --------
    let bullets = [];
    let enemies = [];
    let enemyBullets = [];

    // -------- 射撃クール --------
    let shotCooldown = 0;
    const SHOT_COOLDOWN_MAX = 10;
    const BULLET_SIZE = 4;
    const BULLET_SPEED = 8;

    // -------- キー入力 --------
    const keys = {
        ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
        z: false, x: false, q: false
    };
    let bombRequested = false;

    // -------- ステージデータ管理 --------
    let stages = [];                // 複数ステージ [{ name, enemies, bombParams, clearCondition }]
    let currentStageIndex = 0;
    let currentStageEnemies = [];   // 現在選択中のステージの敵配列（エディタ用）
    let gameStageEnemies = [];       // ゲームで使用する敵出現キュー

    // デフォルトステージ
    function getDefaultStage() {
        return {
            name: "Stage 1",
            enemies: [
                { shape: 'square', hp: 1, size: 20, spawnFrame: 0, bulletType: 'none' },
                { shape: 'circle', hp: 2, size: 20, spawnFrame: 60, bulletType: 'straight' },
                { shape: 'triangle', hp: 1, size: 20, spawnFrame: 120, bulletType: 'none' }
            ],
            bombParams: { maxBombCount: 3, invincibleFrames: 60 },
            clearCondition: { type: 'enemiesDefeated', value: 3 }  // 3体倒したらクリア（デモ用）
        };
    }

    function initStages() {
        stages = [getDefaultStage()];
        currentStageIndex = 0;
        currentStageEnemies = JSON.parse(JSON.stringify(stages[0].enemies));
        updateStageSelect();
    }

    // ステージ選択UI更新
    function updateStageSelect() {
        const select = document.getElementById('stageSelect');
        select.innerHTML = '';
        stages.forEach((stage, idx) => {
            const option = document.createElement('option');
            option.value = idx;
            option.textContent = stage.name;
            if (idx === currentStageIndex) option.selected = true;
            select.appendChild(option);
        });
    }

    // ステージ選択変更時
    function loadStageFromSelect() {
        const select = document.getElementById('stageSelect');
        const idx = parseInt(select.value);
        if (!isNaN(idx) && stages[idx]) {
            currentStageIndex = idx;
            currentStageEnemies = JSON.parse(JSON.stringify(stages[idx].enemies));
            renderEnemyList();
        }
    }

    // 新規ステージ
    function newStage() {
        const name = prompt("Stage name:", "New Stage");
        if (name) {
            stages.push({
                name: name,
                enemies: [],
                bombParams: { maxBombCount: 3, invincibleFrames: 60 },
                clearCondition: { type: 'enemiesDefeated', value: 10 }
            });
            currentStageIndex = stages.length - 1;
            currentStageEnemies = [];
            updateStageSelect();
            renderEnemyList();
        }
    }

    // ステージ削除
    function deleteStage() {
        if (stages.length <= 1) {
            alert("Cannot delete the last stage.");
            return;
        }
        stages.splice(currentStageIndex, 1);
        if (currentStageIndex >= stages.length) currentStageIndex = stages.length - 1;
        currentStageEnemies = JSON.parse(JSON.stringify(stages[currentStageIndex].enemies));
        updateStageSelect();
        renderEnemyList();
    }

    // 現在のステージを保存
    function saveCurrentStage() {
        stages[currentStageIndex].enemies = JSON.parse(JSON.stringify(currentStageEnemies));
        alert("Stage saved: " + stages[currentStageIndex].name);
    }

    // -------- エディタ関連のUI操作 --------
    function renderEnemyList() {
        const list = document.getElementById('enemyList');
        list.innerHTML = '';
        currentStageEnemies.forEach((enemy, idx) => {
            const li = document.createElement('li');
            li.textContent = `${enemy.shape} (HP:${enemy.hp}, Size:${enemy.size}, Frame:${enemy.spawnFrame}, Bullet:${enemy.bulletType})`;
            const delBtn = document.createElement('button');
            delBtn.textContent = 'Del';
            delBtn.onclick = () => {
                currentStageEnemies.splice(idx, 1);
                renderEnemyList();
            };
            li.appendChild(delBtn);
            list.appendChild(li);
        });
    }

    function addEnemy() {
        const shape = document.getElementById('shape').value;
        const hp = parseInt(document.getElementById('hp').value);
        const size = parseInt(document.getElementById('size').value);
        const spawnFrame = parseInt(document.getElementById('spawnFrame').value);
        const bulletType = document.getElementById('bulletType').value;
        currentStageEnemies.push({ shape, hp, size, spawnFrame, bulletType });
        currentStageEnemies.sort((a,b) => a.spawnFrame - b.spawnFrame);
        renderEnemyList();
    }

    // エディタデータをゲームに適用（currentStageIndexのステージを使う）
    function applyToGame() {
        // ステージデータのコピーを作成
        const stage = stages[currentStageIndex];
        gameStageEnemies = JSON.parse(JSON.stringify(stage.enemies));
        // ソート
        gameStageEnemies.sort((a,b) => a.spawnFrame - b.spawnFrame);
        // ボムパラメータなどをグローバルに反映（ゲーム開始時に使う）
        window.bombParams = stage.bombParams;
        window.clearCondition = stage.clearCondition;
        alert(`Applied stage "${stage.name}" to game. Start game to play.`);
    }

    // ローカルストレージ保存
    function saveToLocalStorage() {
        localStorage.setItem('shooterStages', JSON.stringify(stages));
        alert('All stages saved to localStorage');
    }

    // ローカルストレージ読み込み
    function loadFromLocalStorage() {
        const data = localStorage.getItem('shooterStages');
        if (data) {
            try {
                stages = JSON.parse(data);
                if (!stages.length) throw new Error();
                currentStageIndex = 0;
                currentStageEnemies = JSON.parse(JSON.stringify(stages[0].enemies));
                updateStageSelect();
                renderEnemyList();
                alert('Loaded from localStorage');
            } catch(e) {
                alert('Invalid data');
            }
        } else {
            alert('No saved data');
        }
    }

    // JSONエクスポート（全ステージ）
    function exportJSON() {
        const jsonStr = JSON.stringify(stages, null, 2);
        const blob = new Blob([jsonStr], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'shooter_stages.json';
        a.click();
        URL.revokeObjectURL(url);
    }

    // JSONインポート
    function importJSON(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const imported = JSON.parse(ev.target.result);
                if (Array.isArray(imported) && imported.length) {
                    stages = imported;
                    currentStageIndex = 0;
                    currentStageEnemies = JSON.parse(JSON.stringify(stages[0].enemies));
                    updateStageSelect();
                    renderEnemyList();
                    alert('Imported stages');
                } else {
                    throw new Error();
                }
            } catch(e) {
                alert('Invalid JSON file');
            }
        };
        reader.readAsText(file);
    }

    // -------- ゲーム初期化（プレイ開始時）--------
    function initGame() {
        score = 0;
        bombCount = (window.bombParams && window.bombParams.maxBombCount) ? window.bombParams.maxBombCount : 3;
        enemiesDefeated = 0;
        bullets = [];
        enemies = [];
        enemyBullets = [];
        player.lives = 3;
        player.invincibleFrames = 0;
        player.x = canvas.width/2;
        player.y = canvas.height/2;
        shotCooldown = 0;
        frameCount = 0;
        // ゲーム用の出現キューをコピー（gameStageEnemies は applyToGame で設定されている前提）
        if (!gameStageEnemies || gameStageEnemies.length === 0) {
            // デフォルトで空の場合はダミー
            gameStageEnemies = [
                { shape: 'square', hp: 1, size: 20, spawnFrame: 0, bulletType: 'none' },
                { shape: 'circle', hp: 2, size: 20, spawnFrame: 60, bulletType: 'straight' },
                { shape: 'triangle', hp: 1, size: 20, spawnFrame: 120, bulletType: 'none' }
            ];
        }
        // 出現キューをソートしてコピー（破壊的変更を避けるため深いコピー）
        window.spawnQueue = JSON.parse(JSON.stringify(gameStageEnemies));
        window.spawnQueue.sort((a,b) => a.spawnFrame - b.spawnFrame);
    }

    // 敵の出現（スケジューリング）
    function spawnEnemies() {
        while (window.spawnQueue && window.spawnQueue.length > 0 && window.spawnQueue[0].spawnFrame <= frameCount) {
            const enemyData = window.spawnQueue.shift();
            enemies.push({
                ...enemyData,
                x: canvas.width,
                y: Math.random() * (canvas.height - enemyData.size),
                width: enemyData.size,
                height: enemyData.size,
                hp: enemyData.hp,
                shotTimer: 0
            });
        }
    }

    // -------- 形状別描画 --------
    function drawEnemy(e) {
        ctx.fillStyle = '#f00';
        const x = e.x, y = e.y, size = e.size;
        switch(e.shape) {
            case 'square':
                ctx.fillRect(x - size/2, y - size/2, size, size);
                break;
            case 'circle':
                ctx.beginPath();
                ctx.arc(x, y, size/2, 0, Math.PI*2);
                ctx.fill();
                break;
            case 'triangle':
                ctx.beginPath();
                const half = size/2;
                const p1 = { x: x + size*0.6, y: y };
                const p2 = { x: x - size*0.4, y: y - half };
                const p3 = { x: x - size*0.4, y: y + half };
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.lineTo(p3.x, p3.y);
                ctx.fill();
                break;
        }
    }

    // 点と三角形の内外判定
    function pointInTriangle(px, py, ax, ay, bx, by, cx, cy) {
        const v0x = cx - ax;
        const v0y = cy - ay;
        const v1x = bx - ax;
        const v1y = by - ay;
        const v2x = px - ax;
        const v2y = py - ay;
        const dot00 = v0x * v0x + v0y * v0y;
        const dot01 = v0x * v1x + v0y * v1y;
        const dot02 = v0x * v2x + v0y * v2y;
        const dot11 = v1x * v1x + v1y * v1y;
        const dot12 = v1x * v2x + v1y * v2y;
        const invDenom = 1 / (dot00 * dot11 - dot01 * dot01);
        const u = (dot11 * dot02 - dot01 * dot12) * invDenom;
        const v = (dot00 * dot12 - dot01 * dot02) * invDenom;
        return (u >= 0) && (v >= 0) && (u + v < 1);
    }

    // 弾 vs 敵（形状別）
    function bulletCollidesWithEnemy(bullet, enemy) {
        const bx = bullet.x + bullet.width/2;
        const by = bullet.y + bullet.height/2;
        const ex = enemy.x, ey = enemy.y, size = enemy.size;
        switch(enemy.shape) {
            case 'square':
                return bx > ex - size/2 && bx < ex + size/2 && by > ey - size/2 && by < ey + size/2;
            case 'circle':
                const dx = bx - ex, dy = by - ey;
                return Math.hypot(dx, dy) < size/2;
            case 'triangle':
                const half = size/2;
                const p1 = { x: ex + size*0.6, y: ey };
                const p2 = { x: ex - size*0.4, y: ey - half };
                const p3 = { x: ex - size*0.4, y: ey + half };
                return pointInTriangle(bx, by, p1.x, p1.y, p2.x, p2.y, p3.x, p3.y);
            default:
                return false;
        }
    }

    // 敵の射撃
    function updateEnemyShooting() {
        for (let enemy of enemies) {
            if (enemy.bulletType === 'straight') {
                if (enemy.shotTimer <= 0) {
                    const dx = player.x - enemy.x;
                    const dy = player.y - enemy.y;
                    const len = Math.hypot(dx, dy);
                    if (len > 0) {
                        const vx = dx / len * 5;
                        const vy = dy / len * 5;
                        enemyBullets.push({
                            x: enemy.x, y: enemy.y, vx: vx, vy: vy,
                            width: 5, height: 5
                        });
                    }
                    enemy.shotTimer = 60;
                } else {
                    enemy.shotTimer--;
                }
            }
        }
    }

    // 敵弾更新・自機衝突
    function updateEnemyBullets() {
        for (let i = enemyBullets.length-1; i >= 0; i--) {
            const eb = enemyBullets[i];
            eb.x += eb.vx;
            eb.y += eb.vy;
            if (eb.x < 0 || eb.x > canvas.width || eb.y < 0 || eb.y > canvas.height) {
                enemyBullets.splice(i,1);
                continue;
            }
            if (player.invincibleFrames <= 0 &&
                eb.x < player.x + player.width && eb.x + eb.width > player.x &&
                eb.y < player.y + player.height && eb.y + eb.height > player.y) {
                player.lives--;
                player.invincibleFrames = 60;
                enemyBullets.splice(i,1);
                if (player.lives <= 0) gameState = 'gameOver';
            }
        }
    }

    // 自機更新
    function updatePlayer() {
        let dx = 0, dy = 0;
        if (keys.ArrowUp) dy -= 1;
        if (keys.ArrowDown) dy += 1;
        if (keys.ArrowLeft) dx -= 1;
        if (keys.ArrowRight) dx += 1;
        if (dx !== 0 || dy !== 0) {
            const len = Math.hypot(dx, dy);
            dx /= len; dy /= len;
        }
        player.x += dx * player.speed;
        player.y += dy * player.speed;
        player.x = Math.min(Math.max(player.x, player.width/2), canvas.width - player.width/2);
        player.y = Math.min(Math.max(player.y, player.height/2), canvas.height - player.height/2);
    }

    // 弾更新
    function updateBullets() {
        for (let i=bullets.length-1; i>=0; i--) {
            bullets[i].x += BULLET_SPEED;
            if (bullets[i].x > canvas.width) bullets.splice(i,1);
        }
    }

    // 敵更新
    function updateEnemies() {
        for (let i=enemies.length-1; i>=0; i--) {
            enemies[i].x -= 3;
            if (enemies[i].x + enemies[i].size/2 < 0) enemies.splice(i,1);
        }
    }

    // 衝突判定（弾vs敵、自機vs敵）
    function handleCollisions() {
        // 弾 vs 敵
        for (let i=bullets.length-1; i>=0; i--) {
            const bullet = bullets[i];
            let hit = false;
            for (let j=enemies.length-1; j>=0; j--) {
                const enemy = enemies[j];
                if (bulletCollidesWithEnemy(bullet, enemy)) {
                    hit = true;
                    enemy.hp--;
                    if (enemy.hp <= 0) {
                        enemies.splice(j,1);
                        score += 10;
                        enemiesDefeated++;
                    }
                    break;
                }
            }
            if (hit) bullets.splice(i,1);
        }
        // 自機 vs 敵（外接矩形簡易）
        if (player.invincibleFrames <= 0) {
            for (let i=enemies.length-1; i>=0; i--) {
                const enemy = enemies[i];
                const er = { x: enemy.x - enemy.size/2, y: enemy.y - enemy.size/2, w: enemy.size, h: enemy.size };
                if (player.x < er.x + er.w && player.x + player.width > er.x &&
                    player.y < er.y + er.h && player.y + player.height > er.y) {
                    player.lives--;
                    player.invincibleFrames = 60;
                    enemies.splice(i,1);
                    if (player.lives <= 0) gameState = 'gameOver';
                    break;
                }
            }
        }
    }

    // 射撃
    function handleShot() {
        if (shotCooldown > 0) shotCooldown--;
        if (keys.z && shotCooldown === 0 && gameState === 'playing') {
            bullets.push({
                x: player.x + player.width/2 - BULLET_SIZE/2,
                y: player.y + player.height/2 - BULLET_SIZE/2,
                width: BULLET_SIZE, height: BULLET_SIZE
            });
            shotCooldown = SHOT_COOLDOWN_MAX;
        }
    }

    // ボム
    function handleBomb() {
        if (bombRequested && bombCount > 0 && gameState === 'playing') {
            enemies = [];
            enemyBullets = [];
            player.invincibleFrames = (window.bombParams && window.bombParams.invincibleFrames) ? window.bombParams.invincibleFrames : 60;
            bombCount--;
            bombRequested = false;
        }
        keys.x = false; // フラグリセット
    }

    // 無敵減少
    function handleInvincibility() {
        if (player.invincibleFrames > 0) player.invincibleFrames--;
    }

    // ゲームオーバー判定
    function checkGameOver() {
        if (player.lives <= 0) gameState = 'gameOver';
    }

    // ステージクリア判定
    function checkStageClear() {
        const cond = window.clearCondition || { type: 'enemiesDefeated', value: 10 };
        if (cond.type === 'enemiesDefeated' && enemiesDefeated >= cond.value) {
            gameState = 'clear';
        }
    }

    // 描画
    function draw() {
        // 背景
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 1;
        for (let i = 0; i < canvas.height; i += 20) {
            ctx.beginPath();
            ctx.moveTo(0, (i + frameCount) % canvas.height);
            ctx.lineTo(canvas.width, (i + frameCount) % canvas.height);
            ctx.stroke();
        }

        // 自機
        if (!(player.invincibleFrames > 0 && (Math.floor(Date.now() / 50) % 2 === 0))) {
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            const angle = 0;
            const x1 = player.x + 12 * Math.cos(angle);
            const y1 = player.y + 12 * Math.sin(angle);
            const x2 = player.x + 8 * Math.cos(angle + 2.5);
            const y2 = player.y + 8 * Math.sin(angle + 2.5);
            const x3 = player.x + 8 * Math.cos(angle - 2.5);
            const y3 = player.y + 8 * Math.sin(angle - 2.5);
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.lineTo(x3, y3);
            ctx.fill();
        }

        // 弾
        ctx.fillStyle = '#ff0';
        for (const b of bullets) ctx.fillRect(b.x, b.y, BULLET_SIZE, BULLET_SIZE);
        // 敵弾
        ctx.fillStyle = '#f0f';
        for (const eb of enemyBullets) ctx.fillRect(eb.x, eb.y, eb.width, eb.height);
        // 敵
        for (const e of enemies) drawEnemy(e);

        // UI
        ctx.fillStyle = '#fff';
        ctx.font = '20px monospace';
        ctx.fillText('SCORE: '+score, 10, 30);
        ctx.fillText('LIVES: '+player.lives, 10, 60);
        ctx.fillText('BOMB: '+bombCount, 10, 90);

        // 状態別表示
        if (gameState === 'title') {
            ctx.fillStyle = '#fff';
            ctx.font = '24px monospace';
            ctx.fillText('HORIZONTAL SHOOTER', canvas.width/2-150, canvas.height/2-30);
            ctx.font = '16px monospace';
            ctx.fillText('PRESS Z KEY', canvas.width/2-60, canvas.height/2+20);
            ctx.fillText('E: EDITOR', canvas.width/2-40, canvas.height/2+50);
        } else if (gameState === 'pause') {
            ctx.fillStyle = '#fff';
            ctx.font = '24px monospace';
            ctx.fillText('PAUSE', canvas.width/2-40, canvas.height/2);
        } else if (gameState === 'gameOver') {
            ctx.fillStyle = '#f00';
            ctx.font = '24px monospace';
            ctx.fillText('GAME OVER', canvas.width/2-70, canvas.height/2-20);
            ctx.font = '16px monospace';
            ctx.fillText('SCORE: '+score, canvas.width/2-40, canvas.height/2+10);
            ctx.fillText('PRESS R', canvas.width/2-40, canvas.height/2+40);
        } else if (gameState === 'clear') {
            ctx.fillStyle = '#0f0';
            ctx.font = '24px monospace';
            ctx.fillText('STAGE CLEAR!', canvas.width/2-70, canvas.height/2-20);
            ctx.font = '16px monospace';
            ctx.fillText('SCORE: '+score, canvas.width/2-40, canvas.height/2+10);
            ctx.fillText('PRESS R', canvas.width/2-40, canvas.height/2+40);
        } else if (gameState === 'editor') {
            ctx.fillStyle = '#0f0';
            ctx.font = '20px monospace';
            ctx.fillText('EDITOR MODE', canvas.width/2-60, 30);
        }
    }

    // メインループ
    function update() {
        if (gameState === 'playing') {
            frameCount++;
            updatePlayer();
            updateBullets();
            updateEnemies();
            updateEnemyShooting();
            updateEnemyBullets();
            handleCollisions();
            spawnEnemies();
            handleShot();
            handleBomb();
            handleInvincibility();
            checkGameOver();
            checkStageClear();
        }
        draw();
        requestAnimationFrame(update);
    }

    // -------- イベント設定 --------
    function handleKeyDown(e) {
        const key = e.key;
        if (key === 'z' || key === 'Z') keys.z = true;
        if (key === 'x' || key === 'X') {
            if (gameState === 'playing') bombRequested = true;
        }
        if (key === 'q' || key === 'Q') {
            if (gameState === 'playing') gameState = 'pause';
            else if (gameState === 'pause') gameState = 'playing';
            return;
        }
        if (key === 'ArrowUp') keys.ArrowUp = true;
        if (key === 'ArrowDown') keys.ArrowDown = true;
        if (key === 'ArrowLeft') keys.ArrowLeft = true;
        if (key === 'ArrowRight') keys.ArrowRight = true;
        if ((key === 'r' || key === 'R') && (gameState === 'gameOver' || gameState === 'clear')) {
            gameState = 'title';
        }
        if (key === 'e' || key === 'E') {
            if (gameState === 'title') {
                gameState = 'editor';
                document.getElementById('editorPanel').style.display = 'block';
            } else if (gameState === 'editor') {
                gameState = 'title';
                document.getElementById('editorPanel').style.display = 'none';
            }
        }
    }
    function handleKeyUp(e) {
        const key = e.key;
        if (key === 'z' || key === 'Z') keys.z = false;
        if (key === 'x' || key === 'X') keys.x = false;
        if (key === 'ArrowUp') keys.ArrowUp = false;
        if (key === 'ArrowDown') keys.ArrowDown = false;
        if (key === 'ArrowLeft') keys.ArrowLeft = false;
        if (key === 'ArrowRight') keys.ArrowRight = false;
    }
    window.addEventListener('keydown', handleKeyDown);
    window.addEventListener('keyup', handleKeyUp);

    // Zキーでタイトルから開始
    window.addEventListener('keydown', (e) => {
        if ((e.key === 'z' || e.key === 'Z') && gameState === 'title') {
            initGame();
            gameState = 'playing';
        }
    });

    // -------- エディタボタン関連 --------
    document.getElementById('closeEditor').onclick = () => {
        gameState = 'title';
        document.getElementById('editorPanel').style.display = 'none';
    };
    document.getElementById('addEnemyBtn').onclick = addEnemy;
    document.getElementById('saveToLocal').onclick = saveToLocalStorage;
    document.getElementById('loadFromLocal').onclick = loadFromLocalStorage;
    document.getElementById('exportJSON').onclick = exportJSON;
    document.getElementById('importBtn').onclick = () => document.getElementById('importJSON').click();
    document.getElementById('importJSON').onchange = (e) => {
        if (e.target.files[0]) importJSON(e.target.files[0]);
    };
    document.getElementById('applyToGame').onclick = applyToGame;
    document.getElementById('stageSelect').onchange = loadStageFromSelect;
    document.getElementById('newStage').onclick = newStage;
    document.getElementById('deleteStage').onclick = deleteStage;
    document.getElementById('saveStage').onclick = saveCurrentStage;

    // 初期化
    initStages();
    applyToGame();  // 最初のステージをゲームに適用
    updateStageSelect();
    renderEnemyList();

    // ゲームスタート
    update();
</script>
</body>
</html>
