name: Rename files in docs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Rename files in docs/
        run: |
          shopt -s nullglob
          for file in docs/*; do
            base=$(basename "$file")
            dir=$(dirname "$file")

            # 半角スペースを _ に置換
            newbase=$(echo "$base" | sed 's/ /_/g')

            # 名前が変わる場合のみ rename
            if [ "$base" != "$newbase" ]; then
              git mv "$file" "$dir/$newbase"
              echo "Renamed: $base → $newbase"
            fi
          done

      - name: Commit changes
        run: |
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "Rename files in docs (spaces → underscores)"
            git push
          fi
