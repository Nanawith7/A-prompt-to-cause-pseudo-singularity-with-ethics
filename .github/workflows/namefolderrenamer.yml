name: Full Path Normalization (slugify)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  normalize-paths:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize all paths (spaces, unicode, symbols)
        run: |
          # Git が認識しているパスを正確に取得
          paths=$(git ls-files)

          if [ -z "$paths" ]; then
            echo "No files found."
            exit 0
          fi

          # 深い階層から順に処理（衝突防止）
          echo "$paths" | awk '{ print length, $0 }' | sort -rn | cut -d" " -f2- | while read file; do

            # slugify: スペース、記号、Unicode をすべて _ に変換
            newfile=$(echo "$file" \
              | sed 's/ /_/g' \
              | sed 's/[^A-Za-z0-9._\/-]/_/g')

            # 変更がなければスキップ
            if [ "$file" = "$newfile" ]; then
              continue
            fi

            echo "Renaming: $file → $newfile"

            # rename 先フォルダを作成
            newdir=$(dirname "$newfile")
            mkdir -p "$newdir"

            # ファイルを移動
            git mv "$file" "$newfile"
          done

      - name: Commit changes
        run: |
          if git diff --cached --quiet; then
            echo "No rename changes."
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "Normalize paths (slugify: spaces + unicode + symbols)"
            git push
          fi
