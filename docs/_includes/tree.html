{% for key in node %}
  {% if key == "_files" %}
    <ul>
      {% for item in node[key] %}
        <li><a href="{{ item.url | relative_url }}">{{ item.title }}</a></li>
      {% endfor %}
    </ul>
  {% else %}
    <h3>{{ key | replace: "_", " " }}</h3>
    <details open>
      <summary>open</summary>
      {% include tree.html node=node[key] %}
    </details>
  {% endif %}
{% endfor %}
